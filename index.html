<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0xTreasure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08000f;
      color: rgba(235,215,255,0.95);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(150,80,255,0.3); border-radius: 2px; }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 18s ease-in-out infinite alternate;
    }
    .bg-orb-1 {
      width: 700px; height: 700px; top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(100,35,200,0.09) 0%, transparent 65%);
    }
    .bg-orb-2 {
      width: 500px; height: 500px; bottom: 0; right: -100px;
      background: radial-gradient(circle, rgba(70,20,160,0.07) 0%, transparent 65%);
      animation-delay: -9s;
    }
    @keyframes orbFloat {
      0% { transform: translate(0,0); }
      100% { transform: translate(20px,30px); }
    }

    .glass {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.05) 100%);
      backdrop-filter: blur(32px) saturate(1.8) brightness(1.05);
      -webkit-backdrop-filter: blur(32px) saturate(1.8) brightness(1.05);
      border: 1px solid rgba(255,255,255,0.13);
      border-top-color: rgba(255,255,255,0.22);
      border-left-color: rgba(255,255,255,0.16);
      border-bottom-color: rgba(255,255,255,0.06);
      border-right-color: rgba(255,255,255,0.08);
      box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.12), 0 8px 32px rgba(0,0,0,0.28);
      overflow: hidden;
      transition: all 0.32s cubic-bezier(0.34,1.56,0.64,1);
    }
    .glass::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 35%, transparent 55%);
      pointer-events: none; z-index: 1; border-radius: inherit;
    }
    .glass::after {
      content: '';
      position: absolute;
      top: -20%; left: -80%; width: 55%; height: 140%;
      background: linear-gradient(108deg, transparent 0%, rgba(255,255,255,0.055) 45%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.055) 55%, transparent 100%);
      pointer-events: none; z-index: 2; border-radius: inherit;
      transition: left 0.55s ease;
    }
    .glass:hover::after { left: 130%; }
    .glass:hover {
      border-color: rgba(200,155,255,0.28);
      border-top-color: rgba(255,255,255,0.30);
      box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.14), 0 12px 40px rgba(90,30,200,0.22), 0 0 0 1px rgba(180,120,255,0.1);
    }

    .glass-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 20px; border-radius: 100px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: rgba(225,200,255,0.88); white-space: nowrap; text-decoration: none;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      user-select: none;
    }
    .glass-btn:hover { transform: scale(1.05); }
    .glass-btn:active { transform: scale(0.95) !important; }

    .nav-glass-btn {
      padding: 6px 15px; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400;
      color: rgba(185,155,225,0.5); cursor: pointer; white-space: nowrap;
      background: transparent; border: 1px solid transparent;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
    }
    .nav-glass-btn::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
    }
    .nav-glass-btn:hover {
      color: rgba(225,200,255,0.88);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-color: rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.22);
      transform: scale(1.04);
    }
    .nav-glass-btn:hover::before { opacity: 1; }
    .nav-glass-btn.active {
      color: rgba(232,208,255,0.97); font-weight: 600;
      background: rgba(140,70,255,0.15);
      backdrop-filter: blur(28px);
      border-color: rgba(180,120,255,0.30);
      border-top-color: rgba(210,170,255,0.28);
      box-shadow: inset 0 1.5px 0 rgba(220,180,255,0.10), 0 4px 18px rgba(100,40,200,0.20);
    }
    .nav-glass-btn.active::before { opacity: 1; }
    .nav-glass-btn:active { transform: scale(0.97); }

    .copy-btn {
      padding: 5px 11px; border-radius: 100px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      flex-shrink: 0; color: rgba(200,165,255,0.7);
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), color 0.2s ease;
      user-select: none;
    }
    .copy-btn:hover { transform: scale(1.08); }
    .copy-btn:active { transform: scale(0.92) !important; }
    .copy-btn.copied { color: rgba(43,78,98) !important; }

    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 36px;
      background: rgba(8,0,15,0.62);
      backdrop-filter: blur(28px) saturate(1.5);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: box-shadow 0.3s;
    }
    #nav.scrolled { box-shadow: 0 4px 32px rgba(0,0,0,0.45); }

    .nav-logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; color: rgba(34, 125, 92, 0.511); letter-spacing: 0.04em; text-decoration: none; }
    .nav-logo span { color: #fff; }
    .nav-links { display: flex; gap: 3px; }

    .hamburger { display: none;  flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 20px; height: 1.5px; background: rgba(43, 78, 98); transition: all 0.3s ease; border-radius: 2px; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { transform: scaleX(0); opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    .mobile-menu {
      position: fixed; top: 61px; left: 0; right: 0; z-index: 90;
      background: rgba(8,0,15,0.96); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 10px 28px 18px;
      animation: slideDown 0.2s ease;
    }
    .mobile-menu-btn {
      display: block; width: 100%; text-align: left;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 13px 0; background: none; border: none;
      border-bottom: 1px solid rgba(180,120,255,0.07);
      cursor: pointer; color: rgba(43, 78, 98); transition: color 0.2s;
    }
    .mobile-menu-btn.active { color: rgba(86, 15, 130, 0.95); font-weight: 600; }
    .mobile-menu-btn:hover { color: rgba(11, 113, 83, 0.858); }

    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .side-dots { position: fixed; right: 24px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 80; }
    .side-dot { height: 6px; border-radius: 3px; border: none; background: rgba(180,120,255,0.2); cursor: pointer; padding: 0; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .side-dot.active { width: 20px !important; background: rgba(175,110,255,0.88); box-shadow: 0 0 10px rgba(150,80,255,0.5); }

    main { padding-top: 62px; position: relative; z-index: 10; }

    .section { min-height: 50vh; display: flex; align-items: center; padding: 40px 36px 40px clamp(36px,8vw,160px); }

    .section-inner { max-width: 640px; width: 100%; opacity: 0; transform: translateY(28px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .section-inner.visible { opacity: 1; transform: translateY(0); }

    .section-label { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .section-label-line { width: 28px; height: 1px; background: rgba(43, 104, 94, 0.45); }
    .section-label-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.22em; color: rgba(200, 100, 160, 0.65); text-transform: uppercase; }

    .section-heading { font-family: 'Syne', sans-serif; font-size: clamp(28px,5vw,46px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; color: #fff; margin-bottom: 18px; }
    .section-sub { display: block; font-size: clamp(13px,1.8vw,16px); font-weight: 400; color: rgba(31, 112, 102, 0.6); margin-top: 7px; letter-spacing: 0.05em; }
    .section-body { font-size: clamp(14px,1.7vw,16px); color:rgba(247, 247, 247, 0.516); line-height: 1.8; margin-bottom: 26px; }

    .avatar-wrapper { margin-bottom: 28px; }
    .avatar-frame { width: 110px; height: 110px; border-radius: 50%; border: 2px solid rgba(200,150,255,0.3); box-shadow: 0 0 28px rgba(140,70,255,0.3), 0 0 0 5px rgba(140,70,255,0.07); overflow: hidden; background: rgba(20,5,40,0.8); transition: box-shadow 0.3s ease; }
    .avatar-frame:hover { box-shadow: 0 0 40px rgba(32, 86, 38, 0.5), 0 0 0 5px rgba(140,70,255,0.14); }
    .avatar-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .social-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-radius: 16px; margin-bottom: 10px; text-decoration: none; color: inherit; transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); gap: 12px; }
    .social-row:hover { transform: translateX(4px); }
    .social-label { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: rgba(230,210,255,0.88); flex: 1; position: relative; z-index: 3; }
    .social-handle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(7, 125, 60, 0.55); position: relative; z-index: 3; }

    .wallet-row { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border-radius: 16px; margin-bottom: 10px; transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .wallet-row:hover { transform: translateX(4px); }
    .chain-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; position: relative; z-index: 3; }
    .wallet-chain { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: rgba(225,205,255,0.85); margin-bottom: 2px; }
    .wallet-addr { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(175,130,210,0.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }
    .wallet-symbol { font-family: 'IBM Plex Mono', monospace; font-size: 11px; opacity: 0.65; margin-right: 4px; }

    .exp-row { display: flex; gap: 20px; padding: 16px 0; border-bottom: 1px solid rgba(180,120,255,0.08); }
    .exp-year { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255, 255, 255, 0.45); min-width: 40px; padding-top: 3px; flex-shrink: 0; }
    .exp-role { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: rgba(230,210,255,0.9); margin-bottom: 3px; }
    .exp-place { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255, 255, 255, 0.5); margin-bottom: 7px; }
    .exp-desc { font-size: 13px; color: rgba(195,165,230,0.58); line-height: 1.6; }

    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulseDot 2s ease-in-out infinite; display: inline-block; }
    @keyframes pulseDot { 0%,100% { opacity:0.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.25); } }

    footer { padding: 48px 36px; text-align: center; position: relative; z-index: 10; }
    .footer-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: rgba(170,125,215,0.38); padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(180,120,255,0.09); background: rgba(255,255,255,0.015); }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .side-dots { display: none; }
      .section { padding: 30px 22px; }
      .wallet-addr { max-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div id="root"></div>

  <script type="text/babel">
        // import Avatars from './Avatar.jpeg'
    const { useState, useEffect, useRef } = React;

    const SECTIONS = ["Introduction", "Experiences", "Open to Work", "Socials"];

    const CONTENT = {
      Introduction: {
        heading: "Treasure's port",
        sub: "DeFi Veteran · Computer Engineer",
        body: "Hi anon! i'm Treasure, an active DeFi & Web3 pioneer/contributor, and also a part-time computer engineer. I've spent the past few years exploring protocols, supporting ecosystems, and learning how decentralized systems evolve in real time.",
      },
      Experiences: {
        heading: "My Expertise",
        body: "over the past 4 years in DeFi and web3 ecosystems, i've contributed across protocol strategies, cross-chain initiatives, platforms management and social impact initiatives. I focus on fundamentals, strong community alignment, and long-term impact over short-term noise.",
        items: [
          { year: "2025", role: "Protocol Contributions", place: "Plume Network", desc: "deep ecosystem interactions, Cross-chain yield research and strong ecosystem support." },
          { year: "2024", role: "Social Platforms Management", place: "memes", desc: "managed various social platforms and driven good community engagements." },
          { year: "2023", role: "Onchain analysis", place: "Independent", desc: "Studied MEV and real-time transaction analysis across EVM networks." },
          { year: "2022", role: "NFTs & Memes", place: "Early DeFi", desc: "actively participated in the early stages of NFT and meme culture." },
        ],
      },
      Socials: {
        heading: "find me on-chain & online",
        links: [
          { label: "X / Twitter", handle: "@0xTreasure", href: "https://x.com/0xTreasure", copy: "@0xTreasure" },
          { label: "Telegram", handle: "OxTreasure", href: "https://t.me/OxTreasure", copy: "OxTreasure" },
          { label: "ENS", handle: "0xTreasure.eth", href: "https://ens.domains/", copy: "0xTreasure.eth" },
        ],
      },

      "Open to Work": {
        heading: "What I'm looking for",
        body: "I'm selectively open to high-conviction opportunities within serious, long-term web3 teams. Roles centered around ecosystem growth, protocol strategy, research, and community alignment interest me most. I value ownership over short-term upside and mission over momentum. If you're building something meant to last a decade, let's talk.",
        cta: "Reach out on Telegram or X",
        ctaHref: "https://t.me/OxTreasure",
      },
    };

    const CopyIcon = () => (
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    );

    const CheckIcon = () => (
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const handle = (e) => {
        e.preventDefault(); e.stopPropagation();
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        }).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta);
          ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        });
      };
      return (
        <button onClick={handle} className={`glass glass-btn copy-btn ${copied ? 'copied' : ''}`}
          title={copied ? 'Copied!' : `Copy: ${text}`}
          style={{
            color: copied ? 'rgba(74,222,128,0.92)' : 'rgba(200,165,255,0.72)',
            background: copied ? 'linear-gradient(135deg,rgba(74,222,128,0.10),rgba(74,222,128,0.05))' : undefined,
            borderColor: copied ? 'rgba(74,222,128,0.25)' : undefined,
          }}>
          {copied ? <CheckIcon /> : <CopyIcon />}
          <span>{copied ? 'Copied' : 'Copy'}</span>
        </button>
      );
    }

    function Avatar() {
      return (
        <div className="avatar-wrapper">
          <div className="avatar-frame">
            <img src='./Avatar.jpeg' alt="0xTreasure" />
          </div>
        </div>
      );
    }

    function Block({ section }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      const d = CONTENT[section];

      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.14 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);

      return (
        <div id={section} data-section={section} className="section" ref={ref}>
          <div className={`section-inner ${visible ? 'visible' : ''}`}>
            <div className="section-label">
              <div className="section-label-line" />
              <span className="section-label-text">{section}</span>
            </div>

            <h2 className="section-heading">
              {d.heading}
              {section === "Introduction" && <span className="section-sub">{d.sub}</span>}
            </h2>

            {section === "Introduction" && <Avatar />}

            {d.body && <p className="section-body">{d.body}</p>}

            {section === "Socials" && d.links.map((l) => (
              <a key={l.label} href={l.href} className="social-row glass" target="_blank" rel="noreferrer">
                <span className="social-label">{l.label}</span>
                <span className="social-handle">{l.handle}</span>
                <CopyButton text={l.copy} />
              </a>
            ))}



            {section === "Experiences" && d.items.map((item, i) => (
              <div key={i} className="exp-row">
                <span className="exp-year">{item.year}</span>
                <div>
                  <div className="exp-role">{item.role}</div>
                  <div className="exp-place">{item.place}</div>
                  <div className="exp-desc">{item.desc}</div>
                </div>
              </div>
            ))}

            {section === "Open to Work" && (
              <a href={d.ctaHref} className="glass glass-btn" target="_blank" rel="noreferrer"
                style={{padding:'13px 30px', borderRadius:'100px', fontSize:'14px', fontWeight:600, letterSpacing:'0.02em', background:'linear-gradient(135deg,rgba(140,70,255,0.16),rgba(100,40,200,0.08))', color:'rgba(228,200,255,0.93)'}}>
                <span className="pulse-dot" />
                {d.cta}
              </a>
            )}
          </div>
        </div>
      );
    }

    function SideDots({ active }) {
      return (
        <div className="side-dots">
          {SECTIONS.map((s) => (
            <button key={s} title={s} className={`side-dot ${active === s ? 'active' : ''}`}
              style={{width: active === s ? undefined : '6px'}}
              onClick={() => document.getElementById(s)?.scrollIntoView({behavior:'smooth',block:'center'})} />
          ))}
        </div>
      );
    }

    function Nav({ active }) {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);

      const goto = (s) => {
        document.getElementById(s)?.scrollIntoView({behavior:'smooth', block:'center'});
        setMenuOpen(false);
      };

      return (
        <>
          <nav id="nav" className={scrolled ? 'scrolled' : ''}>
            <a className="nav-logo" href="#">0x<span>Treasure</span></a>
            <div className="nav-links">
              {SECTIONS.map((s) => (
                <button key={s} className={`nav-glass-btn ${active === s ? 'active' : ''}`} onClick={() => goto(s)}>{s}</button>
              ))}
            </div>
            <button className={`hamburger ${menuOpen ? 'open' : ''}`} onClick={() => setMenuOpen(o => !o)} aria-label="Menu">
              <span /><span /><span />
            </button>
          </nav>
          {menuOpen && (
            <div className="mobile-menu">
              {SECTIONS.map((s) => (
                <button key={s} className={`mobile-menu-btn ${active === s ? 'active' : ''}`} onClick={() => goto(s)}>{s}</button>
              ))}
            </div>
          )}
        </>
      );
    }

    function App() {
      const [active, setActive] = useState("Introduction");

      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => { entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.dataset.section); }); },
          { threshold: 0.42 }
        );
        SECTIONS.forEach((s) => { const el = document.getElementById(s); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      return (
        <>
          <Nav active={active} />
          <SideDots active={active} />
          <main>
            {SECTIONS.map((s) => <Block key={s} section={s} />)}
          </main>
          <footer>
